<style>
  :root {
    --bg-0: #07090c;
    --bg-1: #0c1014;
    --bg-2: #11161c;
    --line: rgba(255, 255, 255, 0.07);
    --line-strong: rgba(255, 255, 255, 0.14);
    --ink-0: #f5f3ef;
    --ink-1: #c9c6bf;
    --ink-2: #7c7973;
    --ink-3: #4a4844;
    --accent: #6ee7c5;
    --accent-2: #f0b67f;
    --accent-3: #7aa7ff;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
    background: var(--bg-0);
    color: var(--ink-0);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .aurora::before, .aurora::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    will-change: transform;
  }
  .aurora::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #1e4d4a 0%, transparent 70%);
    top: -200px; left: -150px;
    animation: drift 22s ease-in-out infinite;
  }
  .aurora::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #2a3a5e 0%, transparent 70%);
    bottom: -200px; right: -150px;
    animation: drift 28s ease-in-out infinite reverse;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(60px, 40px) scale(1.1); }
  }

  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .wrap {
    position: relative;
    z-index: 2;
    max-width: 520px;
    margin: 0 auto;
    padding: 96px 28px 80px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .profile {
    text-align: center;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 0.25s forwards;
  }
  .avatar {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    margin: 0 auto 24px;
    background:
      radial-gradient(circle at 30% 30%, #3a4a5e 0%, #1a1f28 60%, #0c1014 100%);
    border: 1px solid var(--line-strong);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Instrument Serif', serif;
    font-size: 42px;
    color: var(--ink-0);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 20px 50px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .avatar::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, transparent 70%, var(--accent) 85%, transparent 100%);
    z-index: -1;
    opacity: 0.4;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--ink-2);
    margin-bottom: 10px;
  }
  .handle::before { content: '@'; color: var(--accent); }

  .name {
    font-family: 'Instrument Serif', serif;
    font-size: 44px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 14px;
  }

  .bio {
    font-size: 14px;
    color: var(--ink-1);
    max-width: 340px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .bio .div {
    color: var(--ink-3);
    margin: 0 8px;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 0.4s forwards;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 48px;
  }

  .link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--ink-0);
    text-decoration: none;
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1),
                border-color 0.3s ease,
                background 0.3s ease;
    opacity: 0;
    transform: translateY(8px);
    animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  .link:nth-child(1) { animation-delay: 0.5s; }
  .link:nth-child(2) { animation-delay: 0.6s; }
  .link:nth-child(3) { animation-delay: 0.7s; }
  .link:nth-child(4) { animation-delay: 0.8s; }

  .link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.06) 50%, transparent 65%);
    transform: translateX(-100%);
    transition: transform 0.7s ease;
  }
  .link:hover {
    transform: translateY(-2px);
    border-color: var(--line-strong);
    background: linear-gradient(180deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.015) 100%);
  }
  .link:hover::before {
    transform: translateX(100%);
  }
  .link:active { transform: translateY(0); }

  .link-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--accent);
    transition: color 0.3s ease, border-color 0.3s ease;
  }
  .link:hover .link-icon { color: var(--ink-0); border-color: var(--line-strong); }

  .link-body { flex: 1; min-width: 0; }
  .link-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink-0);
    margin-bottom: 2px;
    letter-spacing: -0.005em;
  }
  .link-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .link-arrow {
    color: var(--ink-3);
    transition: transform 0.35s ease, color 0.3s ease;
    flex-shrink: 0;
  }
  .link:hover .link-arrow {
    color: var(--accent);
    transform: translate(3px, -3px);
  }

  .footer {
    margin-top: auto;
    padding-top: 32px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    opacity: 0;
    animation: fadeIn 0.8s ease-out 1.1s forwards;
  }
  .footer a {
    color: var(--ink-2);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .footer a:hover { color: var(--accent); }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 480px) {
    .wrap { padding: 64px 20px 60px; }
    .name { font-size: 36px; }
    .profile { margin-bottom: 44px; }
  }
</style>
</head>
